<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Sana Küçük Bir Sürpriz ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8ec7,#ffbfdc,#ffd6e8);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.card{
width:90%;
max-width:520px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(15px);
border-radius:25px;
padding:35px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:white;
margin-bottom:25px;
text-shadow:0 2px 8px rgba(0,0,0,.2);
}

p{
color:white;
margin-bottom:25px;
font-size:18px;
}

button{
padding:15px 35px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:20px;
transition:.3s;
margin:10px;
}

#start{
background:#ff4081;
color:white;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#f44336;
color:white;
position:relative;
}

.hidden{
display:none;
}

#message{
color:white;
font-size:20px;
height:30px;
margin-bottom:15px;
}

.heart{
position:fixed;
bottom:-30px;
font-size:25px;
animation:fly 5s linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-110vh) scale(2);
opacity:0;
}
}

#result{
display:none;
}

#result h2{
font-size:45px;
color:white;
margin-bottom:20px;
}

#result p{
font-size:22px;
}

</style>

</head>

<body>

<div class="card">

<div id="startScreen">

<h1>💖 Sana Küçük Bir Sürpriz 💖</h1>

<p>
Hazırsan küçük bir ankete başlayalım 😊
</p>

<button id="start">
Ankete Başla ❤️
</button>

</div>

<div id="quiz" class="hidden">

<h1 id="question"></h1>

<div id="message"></div>

<button id="yes">
Evet ❤️
</button>

<button id="no">
Hayır 💔
</button>

</div>

<div id="result">

<h2>🥰 Biliyordum!</h2>

<p>
Seni çok seviyorum ❤️
</p>

</div>

</div>

<script>

const questions=[

"Beni seviyor musun? ❤️",

"Benimle çıkar mısın? 💍",

"Beni yakışıklı buluyor musun? 😎"

];

const funny=[

"Emin misin? 🥺",

"Tekrar düşün ❤️",

"Hayır çalışmıyor galiba 😂",

"Lütfen Evet de 🥹",

"Kaçamazsın 😏"

];

let index=0;
let grow=1;
let msg=0;

const start=document.getElementById("start");
const startScreen=document.getElementById("startScreen");
const quiz=document.getElementById("quiz");
const result=document.getElementById("result");

const question=document.getElementById("question");

const yes=document.getElementById("yes");

const no=document.getElementById("no");

const message=document.getElementById("message");

start.onclick=()=>{

startScreen.classList.add("hidden");

quiz.classList.remove("hidden");

question.innerHTML=questions[index];

};

yes.onclick=()=>{

index++;

grow=1;

yes.style.transform="scale(1)";

message.innerHTML="";

if(index>=questions.length){

quiz.style.display="none";

result.style.display="block";

setInterval(createHeart,250);

return;

}

question.innerHTML=questions[index];

};
no.onclick=()=>{

message.innerHTML=funny[msg % funny.length];

msg++;

grow+=0.35;

yes.style.transform=`scale(${grow})`;

if(grow>2.3){

no.style.position="absolute";

const x=Math.random()*300-120;

const y=Math.random()*220-100;

no.style.transform=`translate(${x}px,${y}px)`;

}

};

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*35)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

</script>

</body>
</html>
