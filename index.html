<!doctype html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sürpriz</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;overflow:hidden;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff7eb3,#ffb6d9)}
.bg{position:fixed;inset:0;z-index:0}
.card{position:relative;z-index:5;background:rgba(255,255,255,.25);backdrop-filter:blur(12px);padding:25px;border-radius:20px;width:min(92%,430px);text-align:center}
.hero{font-size:70px;animation:bounce 2s infinite}
@keyframes bounce{50%{transform:translateY(-10px) scale(1.08)}}
button{padding:12px 28px;margin:10px;border:0;border-radius:12px;font-size:20px;cursor:pointer}
#yes{background:#34c759;color:#fff;transition:.25s}
#no{background:#ff3b30;color:#fff;transition:.25s}
#quiz,#end{display:none}
#msg{min-height:32px;font-size:22px;font-weight:bold;color:#ff006e;transition:.25s}
.heart{position:fixed;bottom:-40px;z-index:1;animation:fly linear forwards}
@keyframes fly{to{transform:translateY(-120vh) rotate(360deg);opacity:0}}
</style></head><body>
<div class='bg'></div>
<div class='card'>
<div id='start'><div class='hero'>🥰💖</div><h1>Sana Küçük Bir Sürpriz</h1><button onclick='begin()'>Ankete Başla ❤️</button></div>
<div id='quiz'><div class='hero'>💞</div><h2 id='q'></h2><div id='msg'></div><button id='yes' onclick='yesClick()'>Evet ❤️</button><br><button id='no' onclick='noClick()'>Hayır 💔</button></div>
<div id='end'><div class='hero'>💘</div><h1>Biliyordum! ❤️</h1></div></div>
<script>
const qs=["Beni seviyor musun? ❤️","Benimle çıkar mısın? 💍","Beni yakışıklı buluyor musun? 😎"],msgs=["Emin misin? 🥺","Tekrar düşün ❤️","Hayır çalışmıyor 😂","Lütfen Evet de 🥹","Kaçamazsın 😄"];
let i=0,g=1,m=0;const y=yes,n=no;
function reset(){g=1;y.style.transform="scale(1)";q.style.transform="translateY(0)";msg.style.transform="translateY(0)";msg.textContent="";n.style.position="static";}
function begin(){start.style.display='none';quiz.style.display='block';q.textContent=qs[0];reset();}
function yesClick(){i++;if(i>=qs.length){quiz.style.display='none';end.style.display='block';return;}reset();q.textContent=qs[i];}
function noClick(){msg.textContent=msgs[m++%msgs.length];g+=.25;y.style.transform=`scale(${g})`;q.style.transform=`translateY(${g*8}px)`;msg.style.transform=`translateY(${g*8}px)`;if(g>2){n.style.position='fixed';n.style.left=Math.max(10,Math.random()*(innerWidth-120))+'px';n.style.top=Math.max(10,Math.random()*(innerHeight-70))+'px';}}
function heart(){let e=["❤️","💖","💕","💘","🥰","🌹"][Math.floor(Math.random()*6)],d=document.createElement('div');d.className='heart';d.textContent=e;d.style.left=Math.random()*100+'vw';d.style.fontSize=(18+Math.random()*28)+'px';d.style.animationDuration=(4+Math.random()*3)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),7000);}
setInterval(heart,300);
</script></body></html>
