<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sürpriz</title><style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff7eb3,#ffb6d9)}
.card{background:rgba(255,255,255,.22);backdrop-filter:blur(10px);padding:30px;border-radius:20px;text-align:center;z-index:2;min-width:320px}
button{padding:12px 28px;margin:10px;border:none;border-radius:12px;font-size:20px;cursor:pointer}
#yes{background:#34c759;color:#fff;transition:.3s}#no{background:#ff3b30;color:#fff;position:relative}
#quiz,#end{display:none}#msg{height:35px;font-size:24px;font-weight:bold;color:#ff006e}
.heart{position:fixed;bottom:-30px;animation:up 6s linear forwards} @keyframes up{to{transform:translateY(-110vh) rotate(360deg);opacity:0}}
</style></head><body>
<div class="card"><div id="start"><h1>💖 Sana Küçük Bir Sürpriz 💖</h1><button onclick="begin()">Ankete Başla ❤️</button></div>
<div id="quiz"><h2 id="q"></h2><button id="yes" onclick="yes()">Evet ❤️</button><p id="msg"></p><button id="no" onclick="no()">Hayır 💔</button></div>
<div id="end"><h1>🥰 Biliyordum!</h1><h2>Seni Çok Seviyorum ❤️</h2></div></div>
<script>
const qs=["Beni seviyor musun? ❤️","Benimle çıkar mısın? 💍","Beni yakışıklı buluyor musun? 😎"],msgs=["Emin misin? 🥺","Tekrar düşün ❤️","Hayır çalışmıyor 😂","Lütfen Evet de 🥹","Kaçamazsın 😄"];
let i=0,g=1,m=0;
const noBtn=document.getElementById("no"),yesBtn=document.getElementById("yes");
function resetButtons(){g=1;yesBtn.style.transform="scale(1)";msg.textContent="";noBtn.style.position="relative";noBtn.style.left="0";noBtn.style.top="0";}
function begin(){start.style.display="none";quiz.style.display="block";q.textContent=qs[0];resetButtons();}
function yes(){i++;if(i>=qs.length){quiz.style.display="none";end.style.display="block";setInterval(makeHeart,180);return;}resetButtons();q.textContent=qs[i];}
function no(){msg.textContent=msgs[m++%msgs.length];g+=.25;yesBtn.style.transform=`scale(${g})`;if(g>2){noBtn.style.position="fixed";noBtn.style.left=Math.random()*(innerWidth-120)+"px";noBtn.style.top=Math.random()*(innerHeight-60)+"px";}}
function makeHeart(){let e=["❤️","💖","💕","🥰","💘","🌹"][Math.floor(Math.random()*6)],d=document.createElement("div");d.className="heart";d.textContent=e;d.style.left=Math.random()*100+"vw";d.style.fontSize=(20+Math.random()*35)+"px";document.body.appendChild(d);setTimeout(()=>d.remove(),6000);}
setInterval(makeHeart,500);
</script></body></html>
