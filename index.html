<!doctype html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sürpriz</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;overflow:hidden;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff7eb3,#ffb6d9)}
.card{position:relative;z-index:5;background:rgba(255,255,255,.22);backdrop-filter:blur(12px);padding:30px;border-radius:20px;text-align:center;width:min(90%,420px)}
button{padding:12px 28px;margin:10px;border:0;border-radius:12px;font-size:20px;cursor:pointer}
#yes{background:#34c759;color:#fff;transition:.3s}#no{background:#ff3b30;color:#fff}
#quiz,#end{display:none}#msg{height:34px;font-size:22px;font-weight:bold;color:#ff006e;margin:8px 0}
.buttons{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.heart{position:fixed;bottom:-40px;pointer-events:none;z-index:1;animation:fly linear forwards}
@keyframes fly{from{transform:translateY(0)}to{transform:translateY(-120vh) rotate(360deg);opacity:0}}
</style></head><body>
<div class="card">
<div id="start"><h1>💖 Sana Küçük Bir Sürpriz 💖</h1><button onclick="begin()">Ankete Başla ❤️</button></div>
<div id="quiz"><h2 id="q"></h2><div class="buttons"><button id="yes" onclick="yesClick()">Evet ❤️</button></div><div id="msg"></div><div class="buttons"><button id="no" onclick="noClick()">Hayır 💔</button></div></div>
<div id="end"><h1>🥰 Biliyordum!</h1><p>Seni Çok Seviyorum ❤️</p></div></div>
<script>
const qs=["Beni seviyor musun? ❤️","Benimle çıkar mısın? 💍","Beni yakışıklı buluyor musun? 😎"];
const msgs=["Emin misin? 🥺","Tekrar düşün ❤️","Hayır çalışmıyor 😂","Lütfen Evet de 🥹","Kaçamazsın 😄"];
let qi=0,g=1,mi=0;
const y=document.getElementById("yes"),n=document.getElementById("no"),m=document.getElementById("msg"),q=document.getElementById("q");
function reset(){g=1;y.style.transform="scale(1)";m.textContent="";n.style.position="relative";n.style.left="0";n.style.top="0";}
function begin(){start.style.display="none";quiz.style.display="block";q.textContent=qs[0];reset();}
function yesClick(){qi++;if(qi>=qs.length){quiz.style.display="none";end.style.display="block";return;}reset();q.textContent=qs[qi];}
function noClick(){m.textContent=msgs[mi++%msgs.length];g+=0.25;y.style.transform="scale("+g+")";if(g>2){n.style.position="fixed";n.style.left=Math.random()*(innerWidth-120)+"px";n.style.top=Math.random()*(innerHeight-70)+"px";}}
function heart(){const e=["❤️","💖","💕","💘","🥰","🌹"][Math.floor(Math.random()*6)],d=document.createElement("div");d.className="heart";d.textContent=e;d.style.left=Math.random()*100+"vw";d.style.fontSize=(20+Math.random()*30)+"px";d.style.animationDuration=(4+Math.random()*3)+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),7000);}
setInterval(heart,350);
</script></body></html>
